<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>工程ピックアップ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans','Meiryo',sans-serif; background: #f0f2f5; color: #1a1a2e; font-size: 14px; }
header { background: #1a1a2e; color: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
header h1 { font-size: 16px; font-weight: 700; }
header span { font-size: 11px; color: #8892b0; margin-left: 6px; }
.container { max-width: 1200px; margin: 0 auto; padding: 14px 10px; }
.card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.card h2 { font-size: 11px; font-weight: 700; color: #8892b0; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 7px; }
.upload-area { border: 2px dashed #c8d0e0; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: all .2s; }
.upload-area:hover,.upload-area.drag { border-color: #3d6be4; background: #f0f4ff; }
.upload-area .icon { font-size: 28px; }
.upload-area p { color: #666; font-size: 12px; margin-top: 5px; }
#fileInput { display: none; }
.file-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.file-pill { display: flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.file-pill .rm { cursor: pointer; opacity:.6; }
.section-label { font-size: 11px; color: #999; margin-bottom: 4px; margin-top: 10px; font-weight: 700; }
.chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 3px; }
.chip { padding: 3px 10px; border-radius: 14px; border: 1.5px solid #d0d5e0; font-size: 12px; cursor: pointer; transition: all .15s; background: #fff; color: #444; }
.chip:hover:not(.active) { border-color: #3d6be4; color: #3d6be4; }
.chip.active { background: #1a1a2e; border-color: #1a1a2e; color: #fff; }
.chip.auto-active { background: #4a6fa5; border-color: #4a6fa5; color: #fff; opacity:.8; cursor:default; }
.chip-note { font-size: 10px; color: #aaa; margin-bottom: 5px; }
.filter-cols { display: flex; gap: 16px; flex-wrap: wrap; }
.filter-col { flex: 1; min-width: 200px; }
.mg { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: 5px; align-items: end; margin-bottom: 7px; }
.mg input { width: 100%; padding: 6px 8px; border: 1.5px solid #c8d0e0; border-radius: 6px; font-size: 12px; font-family: inherit; }
.mg input:focus { outline: none; border-color: #3d6be4; }
.manual-item { display: flex; align-items: center; gap: 7px; padding: 5px 9px; background: #fffbf0; border-radius: 6px; border-left: 3px solid #f5a623; font-size: 11px; margin-top: 4px; }
.manual-item .rm { margin-left: auto; cursor: pointer; color: #e05; }
.btn { padding: 8px 16px; border-radius: 7px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; }
.btn-primary { background: #1a1a2e; color: #fff; }
.btn-primary:hover { background: #2d2d4e; }
.btn-print { background: #1e7e34; color: #fff; }
.btn-sm { padding: 5px 11px; font-size: 11px; }
.btn-outline { background: #fff; color: #333; border: 1.5px solid #ccc; }
.action-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.status { font-size: 11px; color: #666; margin-top: 8px; }
.status strong { color: #1a1a2e; }
.legend { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; border: 1px solid #ccc; flex-shrink:0; }
.work-legend { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.wl-item { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }

/* ===== テーブル ===== */
.table-outer { overflow: hidden; border-radius: 6px; border: 1px solid #dde3f0; }
.table-scroll-wrap { display: flex; align-items: flex-start; }

/* 固定左 */
.table-fixed { flex-shrink: 0; overflow: hidden; box-shadow: 3px 0 6px rgba(0,0,0,0.1); position: relative; z-index: 2; }
/* スクロール右 */
.table-scroll { overflow-x: auto; flex: 1; -webkit-overflow-scrolling: touch; }



table { border-collapse: collapse; font-size: 11px; }
th, td { border: 1px solid #dde3f0; padding: 4px 5px; white-space: nowrap; }
thead th { background: #1a1a2e; color: #fff; font-weight: 700; text-align: center; }
.th-sub { font-size: 9px; color: #8892b0; font-weight: 400; }

/* 固定列幅（コンパクト） */
.td-site   { font-weight: 700; font-size: 10px; width: 90px; max-width: 90px; vertical-align: middle; overflow: hidden; }
.td-person { font-size: 10px; font-weight: 600; width: 44px; max-width: 44px; vertical-align: middle; text-align: center; }
.td-work   { font-size: 10px; width: 80px; max-width: 80px; font-weight: 600; vertical-align: middle; }
.td-file   { font-size: 11px; font-weight: 700; width: 22px; max-width: 22px; text-align: center; vertical-align: middle; }

.site-name { font-size: 10px; font-weight: 700; line-height: 1.3; }
.site-id   { font-size: 9px; color: #888; }
.site-plan { font-size: 9px; color: #555; }

/* 工程色 */
.w-kisou   { background: #fce4ec !important; color: #880e4f; }
.w-kitchen { background: #e8f5e9 !important; color: #1b5e20; }
.w-hakosou { background: #fff3e0 !important; color: #bf360c; }
.w-shunou  { background: #e3f2fd !important; color: #0d47a1; }
.w-denki   { background: #fffde7 !important; color: #f57f17; }
.w-other   { background: #fff    !important; color: #333;    }

.cell-mark { text-align: center; font-weight: 700; font-size: 12px; min-width: 24px; }
.cell-sun  { color: #c00 !important; }
.cell-sat  { color: #1a4bc4 !important; }
td.sun-bg  { background: #fff5f5; min-width: 24px; }
td.sat-bg  { background: #f5f8ff; min-width: 24px; }
td.normal-bg { min-width: 24px; }

/* 邸ごと交互背景 */
.site-even td { background-color: #fafbff; }
.site-odd  td { background-color: #f4f6f0; }
.site-even .w-kisou,.site-odd .w-kisou     { background: #fce4ec !important; }
.site-even .w-kitchen,.site-odd .w-kitchen { background: #e8f5e9 !important; }
.site-even .w-hakosou,.site-odd .w-hakosou { background: #fff3e0 !important; }
.site-even .w-shunou,.site-odd .w-shunou   { background: #e3f2fd !important; }
.site-even .w-denki,.site-odd .w-denki     { background: #fffde7 !important; }

.row-site-divider td  { border-top: 2px solid #8892b0 !important; }
.row-set-divider td   { border-top: 1px dashed #b0b8cc !important; }

@media print {
  header,.card:not(#resultCard),.action-row { display: none !important; }
  body { background: #fff; }
  #resultCard { box-shadow: none; padding: 0; }
  #resultCard h2 { display: none; }
  table { font-size: 8px; }
  th,td { padding: 2px 3px; }
}
</style>
</head>
<body>
<header>
  <div>⚡</div>
  <div><h1>工程ピックアップ<span>電気工事 工程管理ツール</span></h1></div>
</header>
<div class="container">

<div class="card">
  <h2>① Excelファイル読み込み</h2>
  <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
    <div class="icon">📂</div>
    <p>クリックまたはドラッグ＆ドロップ（複数ファイル対応）</p>
    <p style="font-size:10px;color:#aaa;margin-top:2px;">.xlsx / .xls</p>
  </div>
  <input type="file" id="fileInput" multiple accept=".xlsx,.xls">
  <div class="file-pills" id="filePills"></div>
</div>

<div class="card" id="filterCard" style="display:none">
  <h2>② 担当者・工程を選択</h2>
  <div class="filter-cols">
    <div class="filter-col">
      <div class="section-label">担当者</div>
      <div class="chips" id="personChips"></div>
    </div>
    <div class="filter-col">
      <div class="section-label">工程</div>
      <div class="chip-note">🔴キッチン→キ搬も自動　🔵収納工事→箱搬も自動</div>
      <div class="section-label" style="color:#c2185b">── キッチン系</div>
      <div class="chips" id="chipsA"></div>
      <div class="section-label" style="color:#1565c0;margin-top:5px">── 収納系</div>
      <div class="chips" id="chipsB"></div>
      <div class="section-label" style="margin-top:5px">── 器具付け</div>
      <div class="chips" id="chipsKigu"></div>
      <div class="section-label" style="margin-top:5px">── その他工程</div>
      <div class="chips" id="chipsOther"></div>
    </div>
  </div>
</div>

<div class="card">
  <h2>③ 手動入力</h2>
  <div class="mg">
    <input type="text" id="mSite" placeholder="邸名">
    <input type="text" id="mPerson" placeholder="担当者">
    <input type="text" id="mWork" placeholder="工程名">
    <input type="text" id="mDate" placeholder="例: 4/3〜4/7">
    <button class="btn btn-outline btn-sm" onclick="addManual()">追加</button>
  </div>
  <div id="manualList"></div>
</div>

<div class="card">
  <h2>④ 生成・出力</h2>
  <div class="action-row">
    <button class="btn btn-primary" onclick="buildTable()">表を生成する</button>
    <button class="btn btn-print" onclick="window.print()">🖨 印刷/PDF</button>
  </div>
  <div class="status" id="statusBar"></div>
</div>

<div class="card" id="resultCard" style="display:none">
  <h2>⑤ 工程ピックアップ表</h2>
  <div class="legend" id="legend"></div>
  <div class="work-legend" id="workLegend"></div>
  <div class="table-outer">
    <div class="table-scroll-wrap">
      <div class="table-fixed">
        <table id="tblFixed"><thead id="theadFixed"></thead><tbody id="tbodyFixed"></tbody></table>
      </div>
      <div class="table-scroll">
        <table id="tblScroll"><thead id="theadScroll"></thead><tbody id="tbodyScroll"></tbody></table>
      </div>
    </div>
  </div>
</div>

</div>
<script>
const SET_A=['キ搬','キッチン'];
const SET_B=['箱搬','収納工事'];
const WORK_ORDER=['キ搬','キッチン','箱搬','収納工事','電気器具付け'];
const WORK_STYLE={
  'キ搬':        {cls:'w-kisou',   mark:'🔴'},
  'キッチン':    {cls:'w-kitchen', mark:'🟢'},
  '箱搬':        {cls:'w-hakosou', mark:'🟠'},
  '収納工事':    {cls:'w-shunou',  mark:'🔵'},
  '電気器具付け':{cls:'w-denki',   mark:'🟡'},
};
const EXCLUDE_KIGU=['照明器具付け','水道器具付け','ガス器具付け','冷暖・ＨＡ器具付け'];
const EXCLUDE_ABBR=['エ天','ク前','太パ','太器','水器','内配','内水','給ガ','足前','防レ','筋R','Ｍ３','Ｍ４'];
const FILE_COLORS=[
  {bg:'#e8f4fd',text:'#1a5276',border:'#2980b9'},
  {bg:'#fef9e7',text:'#7d6608',border:'#f1c40f'},
  {bg:'#fdf2f8',text:'#76448a',border:'#8e44ad'},
  {bg:'#e9f7ef',text:'#1e8449',border:'#27ae60'},
  {bg:'#fef5e7',text:'#784212',border:'#e67e22'},
  {bg:'#eaf2ff',text:'#154360',border:'#2e86c1'},
];
const SITE_BG=['#fafbff','#f4f6f0'];

let allData=[],manualData=[],fileColors={},fileIdx=0,loadedFiles={};
let selectedPersons=new Set(),selectedWorks=new Set();

// ファイル名→1文字略称
function getFileLabel(fname){
  // 「東京〇〇」の「〇」部分（東京の次の1文字）
  const m=fname.match(/東京(.)/);
  if(m) return m[1];
  // 「AHC〇〇」なら〇の最初
  const m2=fname.match(/AHC(.)/);
  if(m2) return m2[1];
  return fname.replace(/\.xlsx?$/,'').substring(0,1);
}

// ===== アップロード =====
const uploadArea=document.getElementById('uploadArea');
const fileInput=document.getElementById('fileInput');
uploadArea.addEventListener('dragover',e=>{e.preventDefault();uploadArea.classList.add('drag');});
uploadArea.addEventListener('dragleave',()=>uploadArea.classList.remove('drag'));
uploadArea.addEventListener('drop',e=>{e.preventDefault();uploadArea.classList.remove('drag');handleFiles(e.dataTransfer.files);});
fileInput.addEventListener('change',e=>handleFiles(e.target.files));

function handleFiles(files){
  Array.from(files).forEach(f=>{
    if(loadedFiles[f.name]) return;
    const col=FILE_COLORS[fileIdx%FILE_COLORS.length];
    fileColors[f.name]=col;fileIdx++;loadedFiles[f.name]=true;
    addFilePill(f.name,col);readExcel(f);
  });
}
function addFilePill(name,col){
  const p=document.createElement('div');p.className='file-pill';p.id='pill_'+name;
  p.style.cssText=`background:${col.bg};color:${col.text};border:1.5px solid ${col.border}`;
  p.innerHTML=`<span>📄 ${name}</span><span class="rm" onclick="removeFile('${name}')">✕</span>`;
  document.getElementById('filePills').appendChild(p);
}
function removeFile(name){
  delete loadedFiles[name];delete fileColors[name];
  document.getElementById('pill_'+name)?.remove();
  allData=allData.filter(d=>d.source!==name);refreshFilters();
}

// ===== Excel解析 =====
function readExcel(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{const wb=XLSX.read(e.target.result,{type:'binary',cellStyles:true});parseSheet(wb.Sheets[wb.SheetNames[0]],file.name);}
    catch(err){console.error(err);alert(file.name+' の読み込みに失敗しました');}
  };
  reader.readAsBinaryString(file);
}

function parseSheet(ws,filename){
  if(!ws||!ws['!ref']) return;
  const range=XLSX.utils.decode_range(ws['!ref']);
  let dateRow=-1;
  for(let r=0;r<=Math.min(20,range.e.r);r++){
    let cnt=0;
    for(let c=17;c<=Math.min(17+120,range.e.c);c++){
      const cell=ws[XLSX.utils.encode_cell({r,c})];
      if(cell&&(cell.v instanceof Date||(typeof cell.v==='number'&&cell.v>40000&&cell.t==='n'))) cnt++;
    }
    if(cnt>5){dateRow=r;break;}
  }
  const colDateMap={};
  if(dateRow>=0){
    for(let c=17;c<=range.e.c;c++){
      const dc=ws[XLSX.utils.encode_cell({r:dateRow,c})];
      const wc=ws[XLSX.utils.encode_cell({r:dateRow+1,c})];
      if(!dc) continue;
      let d;
      if(dc.v instanceof Date) d=dc.v;
      else if(typeof dc.v==='number'&&dc.v>40000) d=new Date(Math.round((dc.v-25569)*86400*1000));
      if(d) colDateMap[c]={label:`${d.getMonth()+1}/${d.getDate()}`,dow:wc?String(wc.v):'',date:new Date(d)};
    }
  }

  const siteBlocks=[];
  // A列の契約番号が変わるごとに新ブロックとして検出
  let r=10;
  while(r<=range.e.r){
    const aCell=ws[XLSX.utils.encode_cell({r,c:0})];
    const bCell=ws[XLSX.utils.encode_cell({r,c:1})];
    if(!aCell||!aCell.v||!bCell||!bCell.v){r++;continue;}
    const contractNo=String(aCell.v).trim();
    const person=String(bCell.v).trim();
    // A列が英字2文字+数字の契約番号パターン
    if(!/^[A-Z]{2}[A-Z0-9]*\d+$/.test(contractNo)||person.length<1){r++;continue;}

    // このブロックの終わり（A列の値が変わるまで）
    let endRow=r;
    for(let rr=r+1;rr<=Math.min(r+80,range.e.r);rr++){
      const a2=ws[XLSX.utils.encode_cell({r:rr,c:0})];
      if(a2&&a2.v&&String(a2.v).trim()!==contractNo) break;
      endRow=rr;
    }

    // ブロック内でJ列に契約番号が出てくる行を探す
    let planNo='', siteAddr='', siteName='', ownerName='';
    for(let rr=r;rr<=endRow;rr++){
      const jCell=ws[XLSX.utils.encode_cell({r:rr,c:9})];
      const kCell=ws[XLSX.utils.encode_cell({r:rr,c:10})];
      if(jCell&&jCell.v&&String(jCell.v).trim()===contractNo){
        // K列 = 施主名（現場名）
        ownerName=String(kCell?.v||'').trim();
        // 次の行: J列=プランNo, K列=住所
        const planCell=ws[XLSX.utils.encode_cell({r:rr+1,c:9})];
        const addrCell=ws[XLSX.utils.encode_cell({r:rr+1,c:10})];
        planNo=String(planCell?.v||'').trim();
        siteAddr=String(addrCell?.v||'').trim();
        // 現場名 = 施主名（住所）の形式
        siteName=ownerName||(siteAddr||contractNo);
        break;
      }
    }
    if(!siteName) siteName=contractNo;

    siteBlocks.push({startRow:r,endRow,siteId:contractNo,planNo,siteName,siteAddr,ownerName,person});
    r=endRow+1;
  }

  siteBlocks.forEach(block=>{
    const seen=new Set();
    let nouzaiRow=-1;
    for(let rr=block.startRow;rr<=block.endRow;rr++){
      const qCell=ws[XLSX.utils.encode_cell({r:rr,c:16})];
      if(qCell&&qCell.v&&String(qCell.v).includes('納材')){nouzaiRow=rr;break;}
    }
    if(nouzaiRow>=0){
      for(let c=17;c<=range.e.c;c++){
        const cell=ws[XLSX.utils.encode_cell({r:nouzaiRow,c})];
        if(!cell||!cell.v||!colDateMap[c]) continue;
        const val=String(cell.v);
        if(val.includes('キ')){const key=`キ搬_${c}`;if(!seen.has(key)){seen.add(key);allData.push(mkEntry(block,'キ搬',[colDateMap[c]],filename));}}
        if(val.includes('箱')){const key=`箱搬_${c}`;if(!seen.has(key)){seen.add(key);allData.push(mkEntry(block,'箱搬',[colDateMap[c]],filename));}}
      }
    }
    for(let rr=block.startRow;rr<=block.endRow;rr++){
      for(let c=17;c<=range.e.c;c++){
        const cell=ws[XLSX.utils.encode_cell({r:rr,c})];
        if(!cell||!cell.v) continue;
        let val=String(cell.v).replace(/^="?/,'').replace(/"$/,'').trim();
        if(!val.includes('_')) continue;
        const workName=val.split('_')[0].trim();
        if(!workName||workName.length<2||/^\d+$/.test(workName)) continue;
        if(EXCLUDE_KIGU.includes(workName)||EXCLUDE_ABBR.includes(workName)) continue;
        const bgColor=getCellBgColor(ws,rr,c);
        if(!bgColor) continue;
        const dates=[];
        let gapCount=0;
        for(let cc=c;cc<=Math.min(c+90,range.e.c);cc++){
          const ccol=getCellBgColor(ws,rr,cc);
          if(ccol===bgColor&&colDateMap[cc]){dates.push(colDateMap[cc]);gapCount=0;}
          else if(!ccol||ccol==='FFF2F2F2'){gapCount++;if(gapCount>5) break;}
          else{gapCount++;if(gapCount>3) break;}
        }
        if(!dates.length) continue;
        const dupKey=`${block.siteId}||${workName}||${dates[0].label}`;
        if(seen.has(dupKey)) continue;
        seen.add(dupKey);
        allData.push(mkEntry(block,workName,dates,filename));
      }
    }
  });
  refreshFilters();
}

function mkEntry(block,work,dates,filename){
  return{siteId:block.siteId,planNo:block.planNo,siteName:block.siteName,
    siteAddr:block.siteAddr,person:block.person,work,dates,source:filename,manual:false};
}
function getCellBgColor(ws,r,c){
  const cell=ws[XLSX.utils.encode_cell({r,c})];
  if(!cell||!cell.s) return null;
  const fg=cell.s.fgColor||(cell.s.fill&&cell.s.fill.fgColor);
  if(!fg) return null;
  const rgb=fg.rgb||fg.theme;
  if(!rgb||rgb==='00000000'||rgb==='FFFFFFFF'||rgb==='FF000000'||rgb==='FFF2F2F2') return null;
  return rgb;
}

// ===== フィルター =====
function refreshFilters(){
  const persons=[...new Set(allData.map(d=>d.person).filter(Boolean))].sort();
  const works=[...new Set(allData.map(d=>d.work).filter(Boolean))];
  const pc=document.getElementById('personChips');
  pc.innerHTML='';
  if(!persons.length) pc.innerHTML='<span style="font-size:11px;color:#aaa">ファイルを読み込むと表示されます</span>';
  persons.forEach(p=>pc.appendChild(mkChip(p,selectedPersons)));

  const autoKi=selectedWorks.has('キッチン')&&!selectedWorks.has('キ搬');
  const autoHako=selectedWorks.has('収納工事')&&!selectedWorks.has('箱搬');

  const cA=document.getElementById('chipsA');cA.innerHTML='';
  ['キッチン','キ搬'].forEach(w=>{
    const chip=mkChip(w,selectedWorks);
    if(w==='キ搬'&&autoKi){chip.className='chip auto-active';chip.textContent='キ搬（自動）';}
    cA.appendChild(chip);
  });
  const cB=document.getElementById('chipsB');cB.innerHTML='';
  ['収納工事','箱搬'].forEach(w=>{
    const chip=mkChip(w,selectedWorks);
    if(w==='箱搬'&&autoHako){chip.className='chip auto-active';chip.textContent='箱搬（自動）';}
    cB.appendChild(chip);
  });
  const ck=document.getElementById('chipsKigu');ck.innerHTML='';
  if(works.includes('電気器具付け')) ck.appendChild(mkChip('電気器具付け',selectedWorks));
  else ck.innerHTML='<span style="font-size:11px;color:#aaa">（データなし）</span>';
  const co=document.getElementById('chipsOther');co.innerHTML='';
  const exc=new Set(['キッチン','キ搬','収納工事','箱搬','電気器具付け',...EXCLUDE_KIGU,...EXCLUDE_ABBR]);
  const otherWorks=works.filter(w=>!exc.has(w)).sort();
  if(!otherWorks.length) co.innerHTML='<span style="font-size:11px;color:#aaa">（なし）</span>';
  otherWorks.forEach(w=>co.appendChild(mkChip(w,selectedWorks)));
  document.getElementById('filterCard').style.display=(persons.length||works.length)?'':'none';
}
function mkChip(label,set){
  const chip=document.createElement('span');
  chip.className='chip'+(set.has(label)?' active':'');
  chip.textContent=label;
  chip.onclick=()=>{if(set.has(label))set.delete(label);else set.add(label);chip.classList.toggle('active');refreshFilters();};
  return chip;
}

// ===== 手動入力 =====
function addManual(){
  const site=document.getElementById('mSite').value.trim();
  const person=document.getElementById('mPerson').value.trim();
  const work=document.getElementById('mWork').value.trim();
  const dateS=document.getElementById('mDate').value.trim();
  if(!site||!work||!dateS){alert('邸名・工程・日程は必須です');return;}
  const dates=parseDateRange(dateS);
  if(!dates.length){alert('日程の形式: 4/3〜4/7 または 4/5');return;}
  manualData.push({siteId:site,planNo:'',siteName:site,siteAddr:'',person,work,dates,source:'手動入力',manual:true});
  renderManualList();
  ['mSite','mPerson','mWork','mDate'].forEach(id=>document.getElementById(id).value='');
}
function parseDateRange(str){
  const dates=[],y=new Date().getFullYear();
  const m=str.match(/(\d+)\/(\d+)\s*[〜~\-]\s*(\d+)\/(\d+)/);
  if(m){
    const s=new Date(y,+m[1]-1,+m[2]),e=new Date(y,+m[3]-1,+m[4]);
    for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1))
      dates.push({label:`${d.getMonth()+1}/${d.getDate()}`,dow:'日月火水木金土'[d.getDay()],date:new Date(d)});
  }else{
    const m2=str.match(/(\d+)\/(\d+)/);
    if(m2){const d=new Date(y,+m2[1]-1,+m2[2]);dates.push({label:`${d.getMonth()+1}/${d.getDate()}`,dow:'日月火水木金土'[d.getDay()],date:d});}
  }
  return dates;
}
function renderManualList(){
  const list=document.getElementById('manualList');list.innerHTML='';
  manualData.forEach((d,i)=>{
    const div=document.createElement('div');div.className='manual-item';
    div.innerHTML=`<span>📌 <b>${d.siteName}</b> ${d.person?'/ '+d.person:''} / ${d.work} / ${d.dates.map(x=>x.label).join(', ')}</span><span class="rm" onclick="manualData.splice(${i},1);renderManualList()">✕</span>`;
    list.appendChild(div);
  });
}

// ===== 表生成 =====
function buildTable(){
  const effectiveWorks=new Set(selectedWorks);
  if(effectiveWorks.has('キッチン')) effectiveWorks.add('キ搬');
  if(effectiveWorks.has('収納工事')) effectiveWorks.add('箱搬');

  let filtered=[...allData,...manualData];
  const normP=s=>s.replace(/\s/g,''); if(selectedPersons.size>0) filtered=filtered.filter(d=>[...selectedPersons].some(p=>normP(p)===normP(d.person||'')));
  if(effectiveWorks.size>0) filtered=filtered.filter(d=>effectiveWorks.has(d.work));
  if(!filtered.length){document.getElementById('statusBar').innerHTML='⚠️ 該当データがありません。';return;}

  const dedup=new Map();
  filtered.forEach(d=>{
    const key=`${d.siteId}||${d.work}||${d.dates.map(x=>x.label).join(',')}`;
    if(!dedup.has(key)) dedup.set(key,d);
  });
  filtered=[...dedup.values()];

  const dateSet={};
  filtered.forEach(d=>d.dates.forEach(dt=>{dateSet[dt.date.getTime()]=dt;}));
  const sortedDates=Object.entries(dateSet).sort((a,b)=>+a[0]-+b[0]).map(x=>x[1]);

  const siteMap=new Map();
  filtered.forEach(d=>{
    const key=d.siteId+'||'+d.person;
    if(!siteMap.has(key)) siteMap.set(key,{...d,entries:[]});
    siteMap.get(key).entries.push(d);
  });
  const getOrder=w=>{const i=WORK_ORDER.indexOf(w);return i>=0?i:WORK_ORDER.length;};
  siteMap.forEach(site=>{
    site.entries.sort((a,b)=>getOrder(a.work)-getOrder(b.work));
    // キ搬+キッチン、箱搬+収納工事を1行にマージ
    const merged=[];
    const used=new Set();
    site.entries.forEach((e,i)=>{
      if(used.has(i)) return;
      if(e.work==='キ搬'){
        const pair=site.entries.find((x,j)=>j>i&&x.work==='キッチン'&&!used.has(j));
        if(pair){
          const pi=site.entries.indexOf(pair);
          used.add(i);used.add(pi);
          // 日付をマージ（重複除去）
          const dMap={};
          [...e.dates,...pair.dates].forEach(d=>{dMap[d.label]=d;});
          const allDates=Object.values(dMap).sort((a,b)=>a.date-b.date);
          merged.push({...e,work:'キ搬＋キッチン',work2:pair.work,dates:allDates,paired:true,
            cls1:'w-kisou',mark1:'🔴',cls2:'w-kitchen',mark2:'🟢'});
          return;
        }
      }
      if(e.work==='箱搬'){
        const pair=site.entries.find((x,j)=>j>i&&x.work==='収納工事'&&!used.has(j));
        if(pair){
          const pi=site.entries.indexOf(pair);
          used.add(i);used.add(pi);
          const dMap={};
          [...e.dates,...pair.dates].forEach(d=>{dMap[d.label]=d;});
          const allDates=Object.values(dMap).sort((a,b)=>a.date-b.date);
          merged.push({...e,work:'箱搬＋収納工事',work2:pair.work,dates:allDates,paired:true,
            cls1:'w-hakosou',mark1:'🟠',cls2:'w-shunou',mark2:'🔵'});
          return;
        }
      }
      if(!used.has(i)){used.add(i);merged.push(e);}
    });
    site.entries=merged;
  });

  // ヘッダー構築
  const theadF=document.getElementById('theadFixed');
  const theadS=document.getElementById('theadScroll');
  const tbodyF=document.getElementById('tbodyFixed');
  const tbodyS=document.getElementById('tbodyScroll');
  theadF.innerHTML='';theadS.innerHTML='';tbodyF.innerHTML='';tbodyS.innerHTML='';

  const monthMap={};
  sortedDates.forEach(dt=>{const m=dt.label.split('/')[0]+'月';monthMap[m]=(monthMap[m]||0)+1;});

  // 固定ヘッダー（3行分）
  const fR1=theadF.insertRow();
  [['邸名・プランNo.',90],['担当',44],['工程',80],['先',22]].forEach(([t,w])=>{
    const th=document.createElement('th');th.textContent=t;th.rowSpan=3;
    th.style.width=w+'px';th.style.minWidth=w+'px';th.style.maxWidth=w+'px';
    fR1.appendChild(th);
  });
  // 固定ヘッダー2行目・3行目（高さ合わせ用の空行）
  theadF.insertRow();theadF.insertRow();

  // スクロールヘッダー
  const sR1=theadS.insertRow();
  Object.entries(monthMap).forEach(([m,cnt])=>{
    const th=document.createElement('th');th.textContent=m;th.colSpan=cnt;sR1.appendChild(th);
  });
  const sR2=theadS.insertRow();
  sortedDates.forEach(dt=>{
    const th=document.createElement('th');th.textContent=dt.label.split('/')[1];th.style.minWidth='24px';
    if(dt.dow==='日')th.style.color='#ffaaaa';if(dt.dow==='土')th.style.color='#aabbff';
    sR2.appendChild(th);
  });
  const sR3=theadS.insertRow();
  sortedDates.forEach(dt=>{
    const th=document.createElement('th');th.textContent=dt.dow;th.className='th-sub';th.style.minWidth='24px';
    if(dt.dow==='日')th.style.color='#ffaaaa';if(dt.dow==='土')th.style.color='#aabbff';
    sR3.appendChild(th);
  });

  // データ行
  let siteIdx=0;
  siteMap.forEach(site=>{
    const col=fileColors[site.source]||{bg:'#f5f5f5',text:'#333',border:'#ccc'};
    const siteBg=SITE_BG[siteIdx%2];
    const sc=siteIdx%2===0?'site-even':'site-odd';
    siteIdx++;
    const fileLabel=getFileLabel(site.source);

    site.entries.forEach((entry,ei)=>{
      const ws2=WORK_STYLE[entry.work]||{cls:'w-other',mark:'⚪'};
      const prevWork=ei>0?site.entries[ei-1].work:'';
      const inA=SET_A.includes(entry.work),inB=SET_B.includes(entry.work);
      const prevA=SET_A.includes(prevWork),prevB=SET_B.includes(prevWork);
      const isSetDiv=ei>0&&((inA!==prevA)||(inB!==prevB&&!inA&&!prevA));

      // 固定行
      const trF=tbodyF.insertRow();trF.className=sc;
      if(ei===0) trF.classList.add('row-site-divider');
      else if(isSetDiv) trF.classList.add('row-set-divider');

      if(ei===0){
        const tdS=trF.insertCell();
        tdS.rowSpan=site.entries.length;
        tdS.className='td-site';
        tdS.style.cssText=`border-left:3px solid ${col.border};background:${siteBg};width:90px;max-width:90px`;
        tdS.innerHTML=`<div class="site-name">${site.siteName||site.siteId}</div>`
          +`<div class="site-id">${site.siteId}</div>`
          +(site.planNo?`<div class="site-plan">📋${site.planNo}</div>`:'');
        const tdP=trF.insertCell();
        tdP.rowSpan=site.entries.length;
        tdP.className='td-person';
        tdP.style.background=siteBg;
        tdP.textContent=entry.person;
      }
      const tdW=trF.insertCell();
      if(entry.paired){
        tdW.className='td-work';
        tdW.style.padding='2px 4px';
        tdW.innerHTML=`<span style="display:block;font-size:10px" class="${entry.cls1}">${entry.mark1} ${entry.work.split('＋')[0]}</span>`
          +`<span style="display:block;font-size:10px" class="${entry.cls2}">${entry.mark2} ${entry.work2}</span>`;
      } else {
        tdW.className='td-work '+ws2.cls;
        tdW.innerHTML=`${ws2.mark} ${entry.work}`;
      }
      const tdFl=trF.insertCell();
      tdFl.className='td-file';
      if(entry.manual){tdFl.innerHTML='<span style="color:#f5a623;font-weight:700">手</span>';}
      else{tdFl.style.cssText=`background:${col.bg};color:${col.text};font-weight:700`;tdFl.textContent=fileLabel;}

      // スクロール行
      const trS=tbodyS.insertRow();trS.className=sc;
      if(ei===0) trS.classList.add('row-site-divider');
      else if(isSetDiv) trS.classList.add('row-set-divider');

      sortedDates.forEach(dt=>{
        const td=trS.insertCell();
        if(entry.paired){
          // キ搬の日付か収納系の日付か判定
          const hasW1=entry.dates.filter((_,di)=>di<entry.dates.length).some(ed=>ed.label===dt.label);
          // ペアの個別日付を持っていないので全日付で判定
          const has=entry.dates.some(ed=>ed.label===dt.label);
          if(has){
            td.className=entry.cls1+' cell-mark'+(dt.dow==='日'?' cell-sun':dt.dow==='土'?' cell-sat':'');
            td.textContent='●';
          }else{
            td.className=dt.dow==='日'?'sun-bg':dt.dow==='土'?'sat-bg':'normal-bg';
          }
        } else {
          const has=entry.dates.some(ed=>ed.label===dt.label);
          if(has){
            td.className=ws2.cls+' cell-mark'+(dt.dow==='日'?' cell-sun':dt.dow==='土'?' cell-sat':'');
            td.textContent='●';
          }else{
            td.className=dt.dow==='日'?'sun-bg':dt.dow==='土'?'sat-bg':'normal-bg';
          }
        }
      });
    });
  });

  // 行高さ同期
  requestAnimationFrame(()=>{
    syncHeights(document.getElementById('theadFixed').rows, document.getElementById('theadScroll').rows);
    syncHeights(document.getElementById('tbodyFixed').rows, document.getElementById('tbodyScroll').rows);
  });

  // 凡例
  const legend=document.getElementById('legend');
  legend.innerHTML='<span style="font-size:10px;font-weight:700;color:#555">ファイル：</span>';
  Object.entries(fileColors).forEach(([fname,col])=>{
    const lbl=getFileLabel(fname);
    const item=document.createElement('div');item.className='legend-item';
    item.innerHTML=`<div class="legend-dot" style="background:${col.bg};border:1.5px solid ${col.border}"></div><span style="color:${col.text}">「${lbl}」= ${fname}</span>`;
    legend.appendChild(item);
  });
  const wl=document.getElementById('workLegend');wl.innerHTML='';
  [['キ搬','w-kisou','🔴'],['キッチン','w-kitchen','🟢'],['箱搬','w-hakosou','🟠'],['収納工事','w-shunou','🔵'],['電気器具付け','w-denki','🟡']].forEach(([w,cls,mark])=>{
    const item=document.createElement('div');item.className='wl-item '+cls;item.textContent=mark+' '+w;wl.appendChild(item);
  });

  document.getElementById('resultCard').style.display='';
  const total=[...siteMap.values()].reduce((s,v)=>s+v.entries.length,0);
  document.getElementById('statusBar').innerHTML=`<strong>${total}件</strong> / <strong>${siteMap.size}邸</strong>`;
  document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
}

function syncHeights(rowsA,rowsB){
  const len=Math.min(rowsA.length,rowsB.length);
  for(let i=0;i<len;i++){
    // いったんリセット
    rowsA[i].style.height='';rowsB[i].style.height='';
    const h=Math.max(rowsA[i].offsetHeight,rowsB[i].offsetHeight);
    rowsA[i].style.height=h+'px';rowsB[i].style.height=h+'px';
  }
}
